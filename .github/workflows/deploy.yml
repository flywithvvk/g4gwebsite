name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Validate & Build
    runs-on: [self-hosted, g4g-local]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js static export
        run: npm run build

      - name: Verify build output
        run: |
          if (!(Test-Path "out") -or -not (Get-ChildItem "out")) {
            Write-Error "Build output directory 'out' is empty or missing"
            exit 1
          }
          $fileCount = (Get-ChildItem "out" -Recurse -File).Count
          Write-Host "Build output OK - $fileCount files generated"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7

  deploy:
    name: Deploy to Firebase
    needs: build
    runs-on: [self-hosted, g4g-local]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GO4GARAGE_D66FC }}
          channelId: live
          projectId: go4garage-d66fc
