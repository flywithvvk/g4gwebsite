name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Type-check, Build
    runs-on: [self-hosted, g4g-local]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if (!(Test-Path "out/index.html") -or !(Test-Path "out/404.html")) {
            Write-Error "Expected out/index.html and out/404.html were not generated"
            exit 1
          }
          $fileCount = (Get-ChildItem "out" -Recurse -File).Count
          Write-Host "Build output OK - $fileCount files generated"
