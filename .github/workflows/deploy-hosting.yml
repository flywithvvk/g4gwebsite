name: Build & Deploy Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hosting-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Validate, Build & Deploy
    runs-on: [self-hosted, g4g-local]
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js static export
        run: npm run build

      - name: Verify build output
        run: |
          if (!(Test-Path "out") -or -not (Get-ChildItem "out")) {
            Write-Error "Build output directory 'out' is empty or missing"
            exit 1
          }
          $fileCount = (Get-ChildItem "out" -Recurse -File).Count
          Write-Host "Build output OK - $fileCount files generated"

      - name: Materialize Firebase service account
        run: |
          $serviceAccountJson = @'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GO4GARAGE_D66FC }}
          '@

          $serviceAccountJson | ConvertFrom-Json | Out-Null

          $serviceAccountPath = Join-Path $env:RUNNER_TEMP "firebase-service-account.json"
          [System.IO.File]::WriteAllText($serviceAccountPath, $serviceAccountJson)

          "GOOGLE_APPLICATION_CREDENTIALS=$serviceAccountPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Deploy to Firebase Hosting (CLI)
        run: |
          $deployRaw = npx firebase-tools@latest hosting:channel:deploy live --project go4garage-d66fc --non-interactive --json
          $exitCode = $LASTEXITCODE

          $deployRaw | Out-Host

          if ($exitCode -ne 0) {
            exit $exitCode
          }

          try {
            $deployJson = $deployRaw | ConvertFrom-Json
            $deployUrl = $deployJson.result.url

            if (-not $deployUrl -and $deployJson.result.urls.Count -gt 0) {
              $deployUrl = $deployJson.result.urls[0]
            }

            if ($deployUrl) {
              Write-Host "details_url: '$deployUrl'"
              "### Production deploy succeeded`n- URL: $deployUrl" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            }
          }
          catch {
            Write-Warning "Deploy completed but JSON parsing failed; inspect raw output above."
          }
