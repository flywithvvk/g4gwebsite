name: Build & Deploy Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: deploy-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate & Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js static export
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "out" ] || [ -z "$(ls -A out)" ]; then
            echo "::error::Build output directory 'out' is empty or missing"
            exit 1
          fi
          echo "Build output OK - $(find out -type f | wc -l) files generated"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Firebase
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Verify artifact contents
        run: |
          if [ ! -d "out" ] || [ -z "$(ls -A out)" ]; then
            echo "::error::Downloaded artifact directory 'out' is empty or missing"
            exit 1
          fi
          echo "Artifact unpacked - $(find out -type f | wc -l) files found"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GO4GARAGE_D66FC }}
          channelId: live
          projectId: go4garage-d66fc
