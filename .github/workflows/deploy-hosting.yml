name: Build & Deploy Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: deploy-hosting-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Validate, Build & Deploy
    runs-on: [self-hosted, g4g-local]
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js static export
        run: npm run build

      - name: Verify build output
        run: |
          if (!(Test-Path "out") -or -not (Get-ChildItem "out")) {
            Write-Error "Build output directory 'out' is empty or missing"
            exit 1
          }
          $fileCount = (Get-ChildItem "out" -Recurse -File).Count
          Write-Host "Build output OK - $fileCount files generated"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GO4GARAGE_D66FC }}
          channelId: live
          projectId: go4garage-d66fc
